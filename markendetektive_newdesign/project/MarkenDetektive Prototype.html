<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>MarkenDetektive — Prototyp</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #e7eaeb; font-family: 'Nunito', system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Search.jsx"></script>
<script type="text/babel" src="SearchSheet.jsx"></script>
<script type="text/babel" src="RatingsSheet.jsx"></script>
<script type="text/babel" src="ProductDetail.jsx"></script>
<script type="text/babel" src="RewardsHelp.jsx"></script>
<script type="text/babel" src="SubmissionHelp.jsx"></script>
<script type="text/babel" src="AppOnboarding.jsx"></script>
  <script type="text/babel" src="Rewards.jsx"></script>
<script type="text/babel" src="Profile.jsx"></script>
<script type="text/babel" src="Scanner.jsx"></script>
<script type="text/babel" src="Receipt.jsx"></script>
<script type="text/babel" src="Lists.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

// ─── Theme manager ─────────────────────────────────────────
(function(){
  const key = 'md-theme';
  const saved = (() => { try { return localStorage.getItem(key); } catch { return null; } })();
  const initial = saved === 'dark' ? 'dark' : 'light';
  document.documentElement.dataset.theme = initial;
  window.__themeIsDark = initial === 'dark';
  window.__setTheme = function(theme) {
    const t = theme === 'dark' ? 'dark' : 'light';
    document.documentElement.dataset.theme = t;
    window.__themeIsDark = t === 'dark';
    try { localStorage.setItem(key, t); } catch {}
    window.dispatchEvent(new CustomEvent('md-theme-change', { detail: t }));
  };
})();

function useThemeTick() {
  const [, force] = useState(0);
  useEffect(() => {
    const h = () => force(n => n + 1);
    window.addEventListener('md-theme-change', h);
    return () => window.removeEventListener('md-theme-change', h);
  }, []);
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "homeVariant": "a",
  "searchVariant": "a",
  "detailVariant": "a",
  "userName": "Hannah"
}/*EDITMODE-END*/;

const SCREENS = ['home', 'explore', 'scanner', 'receiptscan', 'rewards', 'profile', 'receipts', 'photos', 'favorites', 'lists', 'detail'];

function loadPersisted() {
  try {
    const s = localStorage.getItem('md-prototype-state');
    return s ? JSON.parse(s) : { screen: 'home', productId: null };
  } catch { return { screen: 'home', productId: null }; }
}

function App() {
  useThemeTick();
  const init = loadPersisted();
  const [screen, setScreen] = useState(init.screen || 'home');
  const [product, setProduct] = useState(
    init.productId ? PRODUCTS.find(p => p.id === init.productId) : null
  );
  const [wizardActive, setWizardActive] = useState(false);

  useEffect(() => {
    const onEnter = () => setWizardActive(true);
    const onExit  = () => setWizardActive(false);
    window.addEventListener('md-wizard-enter', onEnter);
    window.addEventListener('md-wizard-exit',  onExit);
    return () => {
      window.removeEventListener('md-wizard-enter', onEnter);
      window.removeEventListener('md-wizard-exit',  onExit);
    };
  }, []);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [showAppOnboard, setShowAppOnboard] = useState(() =>
    typeof window !== 'undefined' && window.aoShouldShowAppOnboarding && window.aoShouldShowAppOnboarding()
  );
  // Re-check after mount in case AppOnboarding.jsx finished loading after App mounted
  useEffect(() => {
    if (!showAppOnboard && window.aoShouldShowAppOnboarding && window.aoShouldShowAppOnboarding()) {
      setShowAppOnboard(true);
    }
  }, []);

  // Persist screen
  useEffect(() => {
    localStorage.setItem('md-prototype-state', JSON.stringify({
      screen, productId: product?.id || null,
    }));
  }, [screen, product]);

  // Edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const openProduct = (p) => { setProduct(p); setScreen('detail'); };
  const nav = (id) => {
    if (id === 'home') setScreen('home');
    else if (id === 'explore') setScreen('explore');
    else if (id === 'scanner') setScreen('scanner');
    else if (id === 'rewards') setScreen('rewards');
    else setScreen(id);
  };

  // Which screen?
  let content;
  if (screen === 'home') {
    content = <Home
      variant={tweaks.homeVariant}
      userName={tweaks.userName}
      onOpenProduct={openProduct}
      onOpenSearch={() => setSearchOpen(true)}
      onOpenScanner={() => setScreen('scanner')}
      onOpenProfile={() => setScreen('profile')}
      onOpenReceipt={() => setScreen('receiptscan')}
      onOpenPhotos={() => setScreen('photos')}
      onOpenFavorites={() => setScreen('favorites')}
      onOpenSurveys={() => setScreen('rewards')}
      onOpenLists={() => setScreen('lists')}
    />;
  } else if (screen === 'explore') {
    content = <Search
      variant={tweaks.searchVariant}
      onOpenProduct={openProduct}
      onBack={() => setScreen('home')}
    />;
  } else if (screen === 'scanner') {
    content = <Scanner onBack={() => setScreen('home')} onOpenProduct={openProduct}/>;
  } else if (screen === 'receiptscan') {
    content = <ReceiptScanner onBack={() => setScreen('home')}/>;
  } else if (screen === 'rewards') {
    content = <Rewards onBack={() => setScreen('home')} onOpenScanner={() => setScreen('scanner')} onOpenProfile={() => setScreen('profile')} onOpenReceipts={() => setScreen('receipts')} onOpenPhotos={() => setScreen('photos')} onOpenReceiptScan={() => setScreen('receiptscan')} onOpenFavorites={() => setScreen('favorites')}/>;
  } else if (screen === 'profile') {
    content = <Profile onBack={() => setScreen('home')} onOpenProduct={openProduct} onOpenRewards={() => setScreen('rewards')}/>;
  } else if (screen === 'receipts') {
    content = <Profile initialView="receipts" onBack={() => setScreen('rewards')} onOpenProduct={openProduct} onOpenRewards={() => setScreen('rewards')} onOpenReceiptScan={() => setScreen('receiptscan')}/>;
  } else if (screen === 'photos') {
    content = <Profile initialView="photos" onBack={() => setScreen('rewards')} onOpenProduct={openProduct} onOpenRewards={() => setScreen('rewards')}/>;
  } else if (screen === 'favorites') {
    content = <Profile initialView="favorites" onBack={() => setScreen('home')} onOpenProduct={openProduct} onOpenRewards={() => setScreen('rewards')}/>;
  } else if (screen === 'lists') {
    content = <Profile initialView="lists" onBack={() => setScreen('home')} onOpenProduct={openProduct} onOpenRewards={() => setScreen('rewards')}/>;
  } else if (screen === 'detail') {
    content = <ProductDetail
      product={product || PRODUCTS[0]}
      variant={tweaks.detailVariant}
      onBack={() => setScreen('home')}
      onOpenLists={() => setScreen('lists')}
    />;
  }

  const tabActive = screen === 'detail' ? 'home' : screen;

  const PHONE_W = 402;
  const PHONE_H = 874;

  return (
    <div style={{
      minHeight: '100vh', width: '100%',
      background: 'var(--th-device-bg)',
      display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      padding: '32px 24px 32px', gap: 32,
    }}>
      {/* Phone frame */}
      <div style={{
        width: PHONE_W, height: PHONE_H, borderRadius: 55, overflow: 'hidden',
        position: 'relative', background: '#000',
        boxShadow: '0 40px 80px rgba(0,0,0,0.2), 0 0 0 2px rgba(0,0,0,0.2), 0 0 0 12px #1a1a1a',
        flexShrink: 0,
      }}>
        <div style={{
          position: 'absolute', inset: 4, borderRadius: 51, overflow: 'hidden',
          background: COLORS.surface,
        }}>
          {/* Dynamic island */}
          <div style={{
            position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
            width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
          }}/>
          {/* Status bar */}
          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 20, pointerEvents: 'none' }}>
            <IOSStatusBar dark={wizardActive || window.__themeIsDark}/>
          </div>
          {/* Content area */}
          <div style={{ position: 'absolute', top: 50, left: 0, right: 0, bottom: 0, overflow: 'auto', background: wizardActive ? '#0f0f0f' : 'transparent' }}>
            {content}
          </div>
          {/* Floating cart FAB — shown on home + detail, above tab bar */}
          {(screen === 'home' || screen === 'detail' || screen === 'explore') && !wizardActive && (
            <div style={{ position: 'absolute', right: 16, bottom: 94, zIndex: 40 }}>
              <CartFab onClick={() => setScreen('lists')}/>
            </div>
          )}
          {/* Sheet portal host — overlays sit here, above content, below tab bar chrome */}
          <div id="__sheet_host" style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 55 }}/>

          {/* App-level onboarding — first-launch survey + explanation */}
          {showAppOnboard && window.AppOnboarding && (
            <window.AppOnboarding onDone={() => { setShowAppOnboard(false); setScreen('home'); setProduct(null); }}/>
          )}
          {/* Home search sheet */}
          {window.SearchSheet && (
            <window.SearchSheet
              open={searchOpen}
              onClose={() => setSearchOpen(false)}
              onOpenProduct={openProduct}
              onSubmitSearch={(q) => { setSearchOpen(false); setScreen('explore'); }}
            />
          )}
          {/* Tab bar */}
          {screen !== 'scanner' && !wizardActive && <TabBar active={tabActive} onNav={nav}/>}
          {/* Home indicator */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
            height: 24, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
            paddingBottom: 8, pointerEvents: 'none',
          }}>
            <div style={{ width: 139, height: 5, borderRadius: 100, background: wizardActive || window.__themeIsDark ? 'rgba(255,255,255,.5)' : 'rgba(0,0,0,.3)' }}/>
          </div>
        </div>
      </div>

      {/* Screen selector sidecar */}
      <div style={{
        width: 180, flexShrink: 0, paddingTop: 20,
        display: 'flex', flexDirection: 'column', gap: 10,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
          <DetectiveMark size={28} color={COLORS.primary}/>
          <span style={{ font: `800 14px ${F}`, color: COLORS.primary, letterSpacing: '-.01em' }}>
            MarkenDetektive
          </span>
        </div>
        <div style={{ font: `500 10px ${F}`, color: COLORS.muted, textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 2 }}>
          Screens
        </div>
        {[
          ['home', 'Home', 'home'],
          ['explore', 'Stöbern', 'compass-outline'],
          ['scanner', 'Scanner', 'barcode-scan'],
          ['rewards', 'Belohnungen', 'star-four-points-outline'],
          ['profile', 'Profil', 'account-circle-outline'],
          ['detail', 'Wahrheits-Check', 'magnify-scan'],
        ].map(([k, label, icon]) => (
          <button key={k} onClick={() => {
            if (k === 'detail' && !product) setProduct(PRODUCTS[0]);
            setScreen(k);
          }} style={{
            height: 40, padding: '0 12px', borderRadius: 10, border: 0,
            background: screen === k ? COLORS.primary : 'var(--th-card)',
            color: screen === k ? '#fff' : COLORS.text,
            font: `700 13px ${F}`, cursor: 'pointer',
            display: 'flex', alignItems: 'center', gap: 10,
            boxShadow: '0 1px 3px rgba(0,0,0,.06)', textAlign: 'left',
          }}>
            <MdI name={icon} size={16}/>
            {label}
          </button>
        ))}
        <div style={{ font: `500 11px ${F}`, color: COLORS.muted, marginTop: 10, lineHeight: 1.45 }}>
          Tipp: Toggle <b>Tweaks</b> in der Toolbar, um Varianten zu wechseln.
        </div>
      </div>

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, width: 280,
          background: 'var(--th-card)', borderRadius: 16, padding: 16,
          boxShadow: '0 12px 32px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.05)',
          zIndex: 100, fontFamily: F,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <div style={{
              width: 26, height: 26, borderRadius: 13, background: COLORS.gradient,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <MdI name="tune-variant" size={14} color="#fff"/>
            </div>
            <span style={{ font: `800 14px ${F}`, color: COLORS.text, flex: 1 }}>Tweaks</span>
          </div>

          <TweakRow label="Home" options={[['a','Detektiv-Akte'],['b','Ticker']]}
            value={tweaks.homeVariant} onChange={v=>updateTweak('homeVariant', v)}/>
          <TweakRow label="Suche — Layout" options={[['a','Grid'],['b','Liste']]}
            value={tweaks.searchVariant} onChange={v=>updateTweak('searchVariant', v)}/>

          <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px dashed ${COLORS.high}` }}>
            <button onClick={() => {
              window.aoResetAppOnboarding && window.aoResetAppOnboarding();
              setShowAppOnboard(true);
              setTweaksOpen(false);
            }} style={{
              width: '100%', height: 34, borderRadius: 8, border: 0, cursor: 'pointer',
              background: COLORS.primary, color: '#fff',
              font: `700 12px ${F}`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
            }}>
              <MdI name="replay" size={14} color="#fff"/>
              App-Onboarding neu starten
            </button>
          </div>

          <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px dashed ${COLORS.high}` }}>
            <div style={{ font: `600 11px ${F}`, color: COLORS.muted, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.06em' }}>Name</div>
            <input value={tweaks.userName} onChange={(e)=>updateTweak('userName', e.target.value)} style={{
              width: '100%', height: 34, padding: '0 10px', borderRadius: 8,
              border: `1px solid ${COLORS.high}`, outline: 0,
              font: `500 13px ${F}`, color: COLORS.text, background: COLORS.low,
            }}/>
          </div>
        </div>
      )}
    </div>
  );
}

function TweakRow({ label, options, value, onChange }) {
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ font: `600 11px ${F}`, color: COLORS.muted, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.06em' }}>{label}</div>
      <div style={{ display: 'flex', gap: 4, background: COLORS.low, padding: 3, borderRadius: 8 }}>
        {options.map(([k, l]) => (
          <button key={k} onClick={()=>onChange(k)} style={{
            flex: 1, height: 30, borderRadius: 6, border: 0,
            background: value === k ? COLORS.card : 'transparent',
            color: value === k ? COLORS.text : COLORS.muted,
            font: `700 12px ${F}`, cursor: 'pointer',
            boxShadow: value === k ? SH_SM : 'none',
          }}>{l}</button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
